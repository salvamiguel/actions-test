name: 'Hello Action'
description: 'A simple fixture action for integration testing'

inputs:
  name:
    description: 'Who to greet'
    required: true
  shout:
    description: 'Whether to shout the greeting'
    required: false
    default: 'false'

outputs:
  greeting:
    description: 'The greeting message'

runs:
  using: node24
  main: index.js
